name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to the same branch makes the previous run's result irrelevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: aqua-app (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aqua-app

    # Runs against PostgreSQL, not phpunit.xml's sqlite default, because
    # production is PostgreSQL and the schema uses Postgres-specific
    # features (jsonb columns, CHECK constraints added via raw ALTER
    # TABLE). Testing on sqlite hid two real defects: migrations emitting
    # DDL sqlite silently ignored, and assertions that only held because
    # sqlite preserves JSON key order where jsonb does not.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aqua_app_test
          POSTGRES_USER: aqua_app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # These override phpunit.xml's <env> entries: PHPUnit does not
      # overwrite a variable that is already set in the environment unless
      # the entry is marked force="true".
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: aqua_app_test
      DB_USERNAME: aqua_app
      DB_PASSWORD: secret

    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_pgsql, pgsql, bcmath, intl
          coverage: none

      - name: Cache composer packages
        uses: actions/cache@v6
        with:
          path: aqua-app/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('aqua-app/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check formatting (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

  frontend:
    name: aqua-frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aqua-frontend

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # --frozen-lockfile: CI must build exactly what bun.lock pins, never
        # silently resolve newer versions. This also sidesteps bunfig.toml's
        # 24h minimumReleaseAge guard, which only applies to resolution.
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        # A compile check only — this artifact is never deployed. The real
        # VITE_API_URL is injected from the shared .env on the server (see
        # scripts/deploy-frontend.sh), so a placeholder is enough here, and
        # is still needed: .env is gitignored and api-client.ts reads the
        # var at build time.
        env:
          VITE_API_URL: https://aqua-api.example.invalid
        run: bun run build
